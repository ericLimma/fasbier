<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fassbier | Cardápio</title>
    <!-- css-->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css">

    <link rel="stylesheet" href="assets/css/normalize.css">
    <link rel="stylesheet" href="assets/css/animacoes.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/inicio.css">
    <link rel="stylesheet" href="assets/css/cardapio01/cardapio-header.css">
    <link rel="stylesheet" href="assets/css/cardapio01/banner-swipper.css">
    <link rel="stylesheet" href="assets/css/cardapio01/page-cardapio.css">
    <link rel="stylesheet" href="assets/css/cardapio01/cardapio-footer.css">

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Mulish:wght@300;400;500;600;700&family=Nanum+Brush+Script&family=Poppins:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Suez+One&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/img/favicon/android-chrome-192x192.png" type="image/x-icon">

    <!-- javaScript -->
    <script defer src="assets/js/menu.js"></script>
    <script defer src="assets/js/voltarAoTopo.js"></script>

</head>

<body class="cardapio-body">

    <main>
        <section class="banner" id="banner">
            <img class="banner_img" src="assets/img/banner/banner-1.jpg" alt="">
            <img class="banner_img" src="assets/img/banner/banner-2.jpg" alt="">
            <img class="banner_img" src="assets/img/banner/banner-3.jpg" alt="">

        </section>
        <section class="cardapio-header">
            <div class="logo-cardapio">
                <img src="assets/img/logo-menu.png" alt="">
            </div>
        </section>
        <div class="cardapio-links">
            <ul>
                <li><a href="#executivo">executivo</a></li>
                <li><a href="#entradas">entradas</a></li>
                <li><a href="#saladas">saladas</a></li>
                <li><a href="#pratos-tipicos">pratos típicos</a></li>
                <li><a href="#peixes">peixes</a></li>
                <li><a href="#carnes">carnes</a></li>
                <li><a href="#risotos">risotos</a></li>
                <li><a href="#sobremesas">sobremesas</a></li>
                <li><a href="#bebidas">bebidas</a></li>
            </ul>
        </div>
        <section class="executivo" id="executivo">
            <img class="cardapio-img" src="assets/img/cardapio/executivo.jpg" alt="">
        </section>
        <section class="entradas" id="entradas">
            <img class="cardapio-img" src="assets/img/cardapio/entradas.jpg" alt="">
        </section>
        <section class="saladas" id="saladas">
            <img class="cardapio-img" src="assets/img/cardapio/saladas.jpg" alt="">
        </section>
        <section class="pratos-tipicos" id="pratos-tipicos">
            <img class="cardapio-img" src="assets/img/cardapio/pratos-tipicos.jpg" alt="">
        </section>
        <section class="peixes" id="peixes">
            <img class="cardapio-img" src="assets/img/cardapio/peixes.jpg" alt="">
        </section>
        <section class="carnes" id="carnes">
            <img class="cardapio-img" src="assets/img/cardapio/carnes.jpg" alt="">
        </section>
        <section class="risotos" id="risotos">
            <img class="cardapio-img" src="assets/img/cardapio/risotos.jpg" alt="">
        </section>
        <section class="sobremesas" id="sobremesas">
            <img class="cardapio-img" src="assets/img/cardapio/sobremesas.jpg" alt="">
        </section>
        <section class="bebidas" id="bebidas">
            <img class="cardapio-img" src="assets/img/cardapio/bebidas1.jpg" alt="">
            <img class="cardapio-img" src="assets/img/cardapio/bebidas2.jpg" alt="">
            <img class="cardapio-img" src="assets/img/cardapio/bebidas3.jpg" alt="">
        </section>


        <footer class="footer">
            <div class="fasbier__footer">

                <button class="footer__button" id="btnVoltarAoTopo">
                    <img class="button__icon" src="assets/img/icons/up.png" alt="">
                    <p>Voltar ao Topo</p>
                </button>
                <div class="footer__logo">
                    <img src="assets/img/logo_preto.png" alt="logo fassbier">
                </div>

            </div>
        </footer>
        <div class="dev__footer">
            <p>Copyright © 2023 Restaurante Fassbier.
                Todos os direitos reservados.</p>
            <p>Desenvolvido por: Erick Lima</p>
        </div>

        <!-- Swiper JS -->
        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
        <script src="assets/js/anima.js"></script>
        <script defer src="assets/js/main.js"></script>
        <script defer src="assets/js/banner-swipper.js"></script>
    </main>
</body>

</html>
